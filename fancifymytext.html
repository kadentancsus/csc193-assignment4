<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fancify My Text</title>
    <script src="fancifymytext.js"></script>
  </head>
  <body>
    <h1>Fancify My Text</h1>

    <fieldset>
      <legend>Text</legend>
      <textarea id="userText" rows="4" cols="30"></textarea>
    </fieldset>

    <fieldset>
      <legend>Fancify</legend>
      <button type="button" onclick="makeBigger()">Bigger!</button>
      <br /><br />
      <label>
        <input type="radio" id="fancyShmancy" name="styleChoice" onchange="applyStyle()" />
        FancyShmancy
      </label>
      <br />
      <label>
        <input type="radio" id="boringBetty" name="styleChoice" onchange="applyStyle()" />
        BoringBetty
      </label>
      <br /><br />
      <button type="button" onclick="mooText()">Moo</button>
    </fieldset>
  </body>
</html>
